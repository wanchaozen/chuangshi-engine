name: Bug report
description: Report a reproducible engine or auditor problem
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Use synthetic data only. Do not include private game content.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
    validations:
      required: true
